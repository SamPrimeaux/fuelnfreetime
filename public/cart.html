<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Fuel & Free Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --steel: #1a1a1a;
      --white: #fff;
      --muted: #b0b0b0;
      --accent: #00a6a6;
      --bronze: #cd7f32;
      --radius: 12px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', sans-serif;
      --header: 72px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--black); color: var(--white); line-height: 1.5; }
    a { color: inherit; text-decoration: none; }
    .store-header {
      position: sticky; top: 0; z-index: 20;
      height: var(--header); display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 4vw, 2.5rem);
      background: rgba(10,10,10,.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .store-logo img { height: 48px; width: auto; display: block; }
    .store-nav { display: flex; gap: 1.5rem; align-items: center; font-size: .85rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .store-nav a:hover { color: var(--bronze); }
    main { max-width: 900px; margin: 0 auto; padding: 2rem clamp(1rem, 4vw, 2.5rem) 4rem; }
    h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 2.8rem); letter-spacing: .04em; margin-bottom: 1.5rem; }
    .cart-line {
      display: grid; grid-template-columns: 80px 1fr auto auto; gap: 1rem; align-items: center;
      background: var(--steel); border-radius: var(--radius); padding: 1rem; margin-bottom: .75rem;
    }
    .cart-line img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: #111; }
    .cart-line h2 { font-size: 1rem; margin-bottom: .25rem; }
    .cart-line p { color: var(--muted); font-size: .9rem; }
    .cart-qty { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
    .cart-qty button {
      width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(255,255,255,.2);
      background: transparent; color: var(--white); cursor: pointer; font-size: 1rem;
    }
    .cart-line-total { font-weight: 800; }
    .cart-remove { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; }
    .cart-empty { color: var(--muted); margin-bottom: 1rem; }
    .store-btn {
      display: inline-flex; padding: .85rem 1.25rem; border-radius: 999px; font-weight: 800;
      background: var(--accent); color: #001;
    }
    .checkout-panel {
      margin-top: 2rem; padding: 1.5rem; background: var(--steel); border-radius: var(--radius);
    }
    .checkout-panel h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    .checkout-row { display: flex; justify-content: space-between; font-weight: 800; margin-bottom: 1rem; }
    .checkout-panel input {
      width: 100%; padding: .85rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,.15);
      background: #111; color: var(--white); margin-bottom: .75rem;
    }
    .checkout-panel button[type="submit"] {
      width: 100%; padding: .95rem; border: none; border-radius: 999px;
      background: var(--accent); color: #001; font-weight: 900; cursor: pointer;
    }
    .checkout-panel button[type="submit"]:disabled { opacity: .5; cursor: not-allowed; }
    .checkout-status { margin-top: .75rem; font-size: .9rem; color: var(--muted); }
    .checkout-status.ok { color: #5dffa8; }
    .checkout-status.err { color: #ff6b6b; }
    @media (max-width: 640px) {
      .cart-line { grid-template-columns: 64px 1fr; }
      .cart-line-total, .cart-remove { grid-column: 2; }
    }
  </style>
</head>
<body>
  <header class="store-header">
    <a class="store-logo" href="/">
      <img src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/ad23b2d9-e2e4-4ad6-eb81-9e4c983df000/thumbnail" alt="Fuel & Free Time" width="256" height="68">
    </a>
    <nav class="store-nav">
      <a href="/shop.html">Shop</a>
      <a href="/cart.html">Cart <span data-cart-count hidden>0</span></a>
    </nav>
  </header>
  <main>
    <h1>Your Cart</h1>
    <div id="cart-root"></div>
    <form id="checkout-form" class="checkout-panel" hidden>
      <h2>Checkout (v1)</h2>
      <div class="checkout-row"><span>Total</span><span id="cart-total">$0.00</span></div>
      <label for="checkout-email">Email for order confirmation</label>
      <input id="checkout-email" type="email" required placeholder="you@example.com" autocomplete="email">
      <button type="submit" id="checkout-submit">Place Order</button>
      <p class="checkout-status" id="checkout-status"></p>
    </form>
  </main>
  <script src="/js/store-catalog.js" defer></script>
  <script src="/js/store-cart.js" defer></script>
</body>
</html>
