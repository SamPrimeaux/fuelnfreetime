<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Fuel & Free Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/store-shell.css">
  <link rel="stylesheet" href="/css/store-cart.css">
  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #0a0a0a;
      color: #fff;
      line-height: 1.5;
    }
    a { color: inherit; }
  </style>
</head>
<body>
  <div id="fnf-store-mount"></div>
  <main class="store-page store-cart-page">
    <div class="cart-head">
      <h1>Your Cart</h1>
      <p class="cart-head-meta" id="cart-item-count">0 items</p>
    </div>
    <div class="cart-layout">
      <div class="cart-items-panel" id="cart-root"></div>
      <form id="checkout-form" class="checkout-panel" hidden>
        <h2>Order summary</h2>
        <div class="checkout-lines" id="checkout-lines"></div>
        <div class="checkout-promo">
          <label for="checkout-discount">Discount code</label>
          <div class="checkout-promo-row">
            <input id="checkout-discount" type="text" placeholder="Enter code" autocomplete="off">
            <button type="button" id="checkout-apply-discount">Apply</button>
          </div>
          <p class="checkout-promo-msg" id="checkout-discount-msg"></p>
        </div>
        <div class="checkout-row checkout-subtotal" id="checkout-subtotal-row" hidden><span>Subtotal</span><span id="cart-subtotal">$0.00</span></div>
        <div class="checkout-row checkout-discount" id="checkout-discount-row" hidden><span>Discount</span><span id="cart-discount">−$0.00</span></div>
        <div class="checkout-row"><span>Total</span><span id="cart-total">$0.00</span></div>
        <label for="checkout-email">Email for confirmation</label>
        <input id="checkout-email" type="email" required placeholder="you@example.com" autocomplete="email">
        <button type="submit" id="checkout-submit">Place order</button>
        <p class="checkout-trust">v1 checkout saves your order to our system. Stripe payment processing is next — we'll email you when it's live.</p>
        <p class="checkout-status" id="checkout-status"></p>
      </form>
    </div>
    <a class="cart-continue" href="/shop">← Continue shopping</a>
  </main>
  <script src="/js/fnf-attribution.js" defer></script>
  <script src="/js/store-catalog.js" defer></script>
  <script src="/js/store-shell.js" defer></script>
  <script src="/js/store-cart.js" defer></script>
</body>
</html>
