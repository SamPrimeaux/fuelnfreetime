<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product – Fuel & Free Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --steel: #1a1a1a;
      --white: #fff;
      --muted: #b0b0b0;
      --accent: #00a6a6;
      --bronze: #cd7f32;
      --radius: 12px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', sans-serif;
      --header: 72px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--black); color: var(--white); line-height: 1.5; }
    a { color: inherit; text-decoration: none; }
    .store-header {
      position: sticky; top: 0; z-index: 20;
      height: var(--header); display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 4vw, 2.5rem);
      background: rgba(10,10,10,.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .store-logo img { height: 48px; width: auto; display: block; }
    .store-nav { display: flex; gap: 1.5rem; align-items: center; font-size: .85rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .store-nav a:hover { color: var(--bronze); }
    .cart-pill {
      background: var(--accent); color: #001; border-radius: 999px;
      padding: .35rem .75rem; font-size: .75rem; font-weight: 800;
    }
    .cart-pill [data-cart-count] { margin-left: .25rem; }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem clamp(1rem, 4vw, 2.5rem) 4rem; }
    .pdp-crumb { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .pdp-crumb a:hover { color: var(--white); }
    .pdp-layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: 2.5rem; align-items: start; }
    .pdp-main {
      background: var(--steel); border-radius: var(--radius); overflow: hidden;
      aspect-ratio: 1; display: grid; place-items: center;
    }
    .pdp-main img { width: 100%; height: 100%; object-fit: cover; }
    .pdp-thumbs { display: flex; gap: .75rem; margin-top: 1rem; flex-wrap: wrap; }
    .pdp-thumb {
      border: 2px solid transparent; border-radius: 8px; padding: 0; background: none; cursor: pointer; width: 72px; height: 72px; overflow: hidden;
    }
    .pdp-thumb.active { border-color: var(--accent); }
    .pdp-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pdp-kicker { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: .12em; font-size: .75rem; margin-bottom: .5rem; }
    .pdp-buy h1 { font-family: var(--font-display); font-size: clamp(2.2rem, 5vw, 3.2rem); letter-spacing: .04em; line-height: 1; margin-bottom: .75rem; }
    .pdp-price { font-size: 1.5rem; font-weight: 900; margin-bottom: 1rem; }
    .pdp-desc { color: var(--muted); margin-bottom: 1.5rem; max-width: 42ch; }
    .pdp-field label { display: block; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .5rem; }
    .pdp-sizes { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.5rem; }
    .pdp-size {
      min-width: 3rem; padding: .65rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,.2);
      background: transparent; color: var(--white); font-weight: 700; cursor: pointer;
    }
    .pdp-size.active { border-color: var(--accent); background: rgba(0,166,166,.15); }
    .pdp-size.disabled { opacity: .35; cursor: not-allowed; }
    .pdp-actions { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
    .pdp-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .9rem 1.4rem; border-radius: 999px; font-weight: 800; border: none; cursor: pointer;
    }
    .pdp-btn.primary { background: var(--accent); color: #001; }
    .pdp-btn.primary:disabled { opacity: .45; cursor: not-allowed; }
    .pdp-btn.ghost { border: 1px solid rgba(255,255,255,.25); background: transparent; color: var(--white); }
    .pdp-note { color: var(--accent); font-weight: 700; font-size: .9rem; min-height: 1.25rem; }
    .pdp-checkout-note { color: var(--muted); font-size: .85rem; margin-top: 1rem; }
    .pdp-error { color: #ff6b6b; padding: 2rem 0; }
    @media (max-width: 900px) {
      .pdp-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="store-header">
    <a class="store-logo" href="/">
      <img src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/ad23b2d9-e2e4-4ad6-eb81-9e4c983df000/thumbnail" alt="Fuel & Free Time" width="256" height="68">
    </a>
    <nav class="store-nav">
      <a href="/shop.html">Shop</a>
      <a class="cart-pill" href="/cart.html">Cart <span data-cart-count hidden>0</span></a>
    </nav>
  </header>
  <main id="pdp-root">
    <p style="color:#888;padding:2rem 0">Loading product…</p>
  </main>
  <script src="/js/store-catalog.js" defer></script>
  <script src="/js/store-cart.js" defer></script>
  <script src="/js/store-product.js" defer></script>
</body>
</html>
