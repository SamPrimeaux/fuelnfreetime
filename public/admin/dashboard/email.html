<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Email — Fuel & Free Time Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin.css">
<link rel="stylesheet" href="/admin/css/mail.css">
</head>
<body>
<script src="/admin/js/shell.js"></script>
<script src="/admin/js/mail.js"></script>
<script>
renderShell(
  "/admin/dashboard/email.html",
  `<div id="mail-root" class="mail-root" aria-label="Mail workspace"></div>`,
  {
    fullBleed: true,
    onReady: () => {
      document.querySelector(".admin-main--bleed")?.classList.add("admin-main--mail");
      bootMailApp();
    },
  }
);
</script>
