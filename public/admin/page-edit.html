<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Page — Fuel & Free Time Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css">
<link rel="stylesheet" href="/admin/css/console.css">
<link rel="stylesheet" href="/admin/css/pages.css">
</head>
<body>
<script src="/admin/js/shell.js"></script>
<script src="/admin/js/pages-shared.js"></script>
<script src="/admin/js/cms-live.js"></script>
<script>
const params = new URLSearchParams(location.search);
const slug = params.get("slug") || "shop";

let pageData = null;
let mediaLibrary = [];
let dirty = false;
let allPages = [];
let liveEditor = null;

renderShell("/admin/pages", `
  <div class="page-editor">
    <header class="page-editor-top">
      <div class="page-editor-crumb">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 4h7l4 4v12H7z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 4v5h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <a href="/admin/pages">Pages</a>
        <span aria-hidden="true">›</span>
        <h1 id="page-crumb-title">…</h1>
      </div>
      <div class="page-editor-top-actions">
        <button type="button" class="btn ghost small" id="duplicate-btn">Duplicate</button>
        <a href="#" class="btn ghost small" id="view-btn" target="_blank" rel="noopener">View</a>
        <div class="page-editor-more">
          <button type="button" class="btn ghost small" id="more-btn">More actions</button>
          <div class="page-editor-menu" id="more-menu">
            <a href="#" id="menu-preview" target="_blank" rel="noopener">Preview draft</a>
            <button type="button" id="menu-publish">Publish live</button>
            <a href="/admin/theme-editor?slug=${slug}">Open theme editor</a>
          </div>
        </div>
        <div class="page-editor-nav-arrows">
          <button type="button" id="prev-page" aria-label="Previous page">▲</button>
          <button type="button" id="next-page" aria-label="Next page">▼</button>
        </div>
      </div>
    </header>

    <div class="page-editor-grid">
      <div class="page-editor-main">
        <div class="page-editor-card">
          <label for="page-title-input">Title</label>
          <div class="page-editor-input-wrap">
            <input type="text" id="page-title-input" autocomplete="off">
            <button type="button" class="page-editor-ai" id="title-ai-btn" aria-label="Ask Agent Sam about this title" title="Agent Sam">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <div class="page-editor-card" id="content-card">
          <div class="page-editor-card-head">
            <label>Content</label>
            <button type="button" class="page-editor-ai" id="content-ai-btn" aria-label="Ask Agent Sam to draft content" title="Agent Sam" style="position:static;transform:none">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <div class="page-editor-toolbar" aria-hidden="true">
            <button type="button" title="Bold" disabled><strong>B</strong></button>
            <button type="button" title="Italic" disabled><em>I</em></button>
            <button type="button" title="Link" disabled>🔗</button>
          </div>
          <div id="sections-root"></div>
        </div>

        <div class="page-editor-card">
          <div class="page-editor-card-head">
            <label>Search engine listing</label>
            <button type="button" class="btn ghost small" id="seo-edit-btn" disabled>Edit</button>
          </div>
          <div class="page-editor-seo-preview">
            <div class="page-editor-seo-title" id="seo-title">Fuel &amp; Free Time</div>
            <div class="page-editor-seo-url" id="seo-url">https://fuelnfreetime.com › …</div>
            <div class="page-editor-seo-desc" id="seo-desc">Page description preview</div>
          </div>
        </div>
      </div>

      <aside class="page-editor-sidebar">
        <div class="page-editor-card">
          <label>Visibility</label>
          <label class="page-editor-radio">
            <input type="radio" name="visibility" value="published" id="vis-visible">
            <span>Visible</span>
          </label>
          <div class="page-editor-radio-meta" id="vis-visible-meta"></div>
          <label class="page-editor-radio">
            <input type="radio" name="visibility" value="draft" id="vis-hidden">
            <span>Hidden</span>
          </label>
        </div>

        <div class="page-editor-card">
          <label class="page-editor-template-label" for="page-template">
            Template
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
          </label>
          <select id="page-template" disabled>
            <option value="default">Default page</option>
          </select>
        </div>
      </aside>
    </div>

    <div class="page-editor-note" id="page-note"></div>
  </div>

  <footer class="page-editor-savebar">
    <button type="button" class="btn primary" id="save-btn" disabled>Save</button>
  </footer>
`);

function setDirty(next = true) {
  dirty = next;
  document.getElementById("save-btn").disabled = !dirty;
}

function showNote(msg, kind) {
  const el = document.getElementById("page-note");
  if (!msg) {
    el.className = "page-editor-note";
    el.textContent = "";
    return;
  }
  el.className = `page-editor-note is-visible is-${kind || "success"}`;
  el.textContent = msg;
}

function updateSeoPreview() {
  const title = document.getElementById("page-title-input")?.value.trim() || pageData?.title || "Page";
  document.getElementById("page-crumb-title").textContent = title;
  document.getElementById("seo-title").textContent = `${title} – Fuel & Free Time`;

  const path = slug === "home" ? "" : slug;
  document.getElementById("seo-url").textContent = `https://fuelnfreetime.com › ${path || "home"}`;

  const section = pageData?.sections?.[0];
  const schema = SECTION_FIELDS[slug]?.[section?.key] || [];
  let desc = "";
  if (section && schema.length) {
    const subField = schema.find((f) => f.key === "subheadline") || schema.find((f) => f.type === "textarea");
    if (subField) {
      const el = document.getElementById(cmsFieldId(section.key, subField.key));
      desc = el?.value.trim() || cmsGetPath(section.content, subField.key) || "";
    }
  }
  document.getElementById("seo-desc").textContent = desc || "Add a subheadline to improve your search preview.";
}

function renderAllSections(sections) {
  if (!sections?.length) {
    return `<p class="pages-empty">No sections on this page yet. Use Publish or run CMS bootstrap.</p>`;
  }
  return sections
    .map(
      (section) => `
    <div class="page-editor-section-block" data-section-key="${cmsEscapeAttr(section.key)}">
      <h3 class="page-editor-section-title">${cmsEscapeHtml(section.key)}</h3>
      ${renderSectionFields(section)}
    </div>`
    )
    .join("");
}

function renderSectionFields(section) {
  const schema = SECTION_FIELDS[slug]?.[section.key];
  if (!schema) {
    return `<p class="pages-empty">No editor schema for this section yet.</p>`;
  }

  return schema
    .map((field) => {
      const id = cmsFieldId(section.key, field.key);
      const val = cmsGetPath(section.content, field.key) ?? "";
      const input =
        field.type === "textarea"
          ? `<textarea id="${id}" rows="4" data-track-dirty>${cmsEscapeHtml(String(val))}</textarea>`
          : `<input id="${id}" type="${field.type === "url" ? "url" : "text"}" value="${cmsEscapeAttr(String(val))}" data-track-dirty>`;

      const mediaRow = field.media
        ? `<div class="page-editor-media">
             <img id="${id}-thumb" src="${cmsEscapeAttr(String(val || ""))}" alt="" onerror="this.style.opacity='0.2'">
             <button type="button" class="btn ghost small" data-media-target="${id}">Pick from library</button>
           </div>`
        : "";

      return `
        <div class="page-editor-field">
          <label for="${id}">${field.label}</label>
          ${input}
          ${mediaRow}
        </div>`;
    })
    .join("");
}

function collectSectionContent(sectionKey) {
  const schema = SECTION_FIELDS[slug]?.[sectionKey] || [];
  const content = {};
  schema.forEach((field) => {
    const el = document.getElementById(cmsFieldId(sectionKey, field.key));
    if (!el) return;
    cmsSetPath(content, field.key, el.value.trim());
  });
  return content;
}

function collectAllSectionContent() {
  const out = [];
  for (const section of pageData?.sections || []) {
    out.push({ key: section.key, content: collectSectionContent(section.key) });
  }
  return out;
}

function wireDirtyTracking() {
  document.querySelectorAll("[data-track-dirty]").forEach((el) => {
    el.addEventListener("input", () => {
      setDirty(true);
      updateSeoPreview();
    });
  });
  document.getElementById("page-title-input")?.addEventListener("input", () => {
    setDirty(true);
    updateSeoPreview();
  });
  document.querySelectorAll('input[name="visibility"]').forEach((el) => {
    el.addEventListener("change", () => setDirty(true));
  });
}

function setVisibilityUI(status, updatedAt) {
  const visible = status === "published";
  document.getElementById("vis-visible").checked = visible;
  document.getElementById("vis-hidden").checked = !visible;
  document.getElementById("vis-visible-meta").textContent = visible
    ? `Visible on your online store${updatedAt ? ` · Last updated ${fmtPageDate(updatedAt)}` : ""}`
    : "";
}

function navigateSibling(delta) {
  const slugs = allPages.length
    ? allPages.map((p) => p.slug)
    : PAGE_SLUG_ORDER;
  const idx = slugs.indexOf(slug);
  if (idx < 0) return;
  const next = slugs[idx + delta];
  if (next) window.location.href = `/admin/page-edit?slug=${encodeURIComponent(next)}`;
}

async function loadPage() {
  const liveUrl = PAGE_ROUTES[slug] || "/";
  const previewUrl = `${liveUrl}${liveUrl.includes("?") ? "&" : "?"}preview=1`;
  document.getElementById("view-btn").href = liveUrl;
  document.getElementById("menu-preview").href = previewUrl;

  try {
    const [pageRes, listRes] = await Promise.all([
      adminFetch(`/api/admin/cms/pages/${slug}`),
      adminFetch("/api/admin/cms/pages").catch(() => ({ pages: [] })),
    ]);

    await loadCmsRegistry();

    pageData = pageRes.page;
    allPages = listRes.pages || [];

    const slugs = allPages.map((p) => p.slug);
    const idx = slugs.indexOf(slug);
    document.getElementById("prev-page").disabled = idx <= 0;
    document.getElementById("next-page").disabled = idx < 0 || idx >= slugs.length - 1;

    document.getElementById("page-title-input").value = pageData.title || "";
    document.getElementById("page-template").innerHTML =
      `<option value="${slug}">${slug}</option>`;

    document.getElementById("sections-root").innerHTML = renderAllSections(pageData.sections);

    setVisibilityUI(pageData.status, pageData.updated_at);
    updateSeoPreview();
    wireDirtyTracking();

    document.querySelectorAll("[data-media-target]").forEach((btn) => {
      btn.addEventListener("click", () => openMediaPicker(btn.dataset.mediaTarget));
    });

    setDirty(false);
  } catch (err) {
    document.getElementById("sections-root").innerHTML =
      `<p class="pages-empty">${cmsEscapeHtml(err.message)}</p>`;
  }
}

async function openMediaPicker(targetId) {
  if (!mediaLibrary.length) {
    try {
      const d = await adminFetch("/api/admin/media");
      mediaLibrary = d.media || [];
    } catch {
      showNote("Could not load media library.", "error");
      return;
    }
  }
  if (!mediaLibrary.length) {
    showNote("Media library is empty — upload assets in Content first.", "error");
    return;
  }

  const names = mediaLibrary.map((m, i) => `${i + 1}. ${m.filename}`).join("\n");
  const pick = prompt(`Enter media number (1–${mediaLibrary.length}):\n\n${names}`);
  const idx = Number(pick) - 1;
  if (!Number.isInteger(idx) || idx < 0 || idx >= mediaLibrary.length) return;

  const asset = mediaLibrary[idx];
  const input = document.getElementById(targetId);
  const thumb = document.getElementById(`${targetId}-thumb`);
  if (input) {
    input.value = asset.url;
    setDirty(true);
  }
  if (thumb) {
    thumb.src = asset.url;
    thumb.style.opacity = "1";
  }
}

async function savePage() {
  const saveBtn = document.getElementById("save-btn");
  saveBtn.disabled = true;

  try {
    const title = document.getElementById("page-title-input").value.trim();
    const status = document.querySelector('input[name="visibility"]:checked')?.value;

    await adminFetch(`/api/admin/cms/pages/${slug}`, {
      method: "PUT",
      body: JSON.stringify({ title, status }),
    });

    for (const { key, content } of collectAllSectionContent()) {
      await adminFetch(`/api/admin/cms/pages/${slug}/sections/${key}`, {
        method: "PUT",
        body: JSON.stringify({ content }),
      });
    }

    showNote("Page saved.", "success");
    await loadPage();
  } catch (err) {
    showNote(err.message, "error");
    setDirty(true);
  }
}

async function publishPage() {
  try {
    await adminFetch(`/api/admin/cms/pages/${slug}/publish`, { method: "POST" });
    showNote("Published to live site.", "success");
    await loadPage();
  } catch (err) {
    showNote(err.message, "error");
  }
}

document.getElementById("save-btn").addEventListener("click", savePage);
document.getElementById("menu-publish").addEventListener("click", publishPage);
document.getElementById("prev-page").addEventListener("click", () => navigateSibling(-1));
document.getElementById("next-page").addEventListener("click", () => navigateSibling(1));

document.getElementById("duplicate-btn").addEventListener("click", () => {
  alert("Duplicate page is coming soon.");
});

document.getElementById("more-btn").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("more-menu").classList.toggle("is-open");
});
document.addEventListener("click", () => {
  document.getElementById("more-menu")?.classList.remove("is-open");
});

document.getElementById("title-ai-btn")?.addEventListener("click", () => {
  window.openAgentsamDrawer?.();
  window.sendAgentsamMessage?.(`Suggest a stronger page title for the ${slug} page on Fuel & Free Time.`);
});

document.getElementById("content-ai-btn")?.addEventListener("click", () => {
  window.openAgentsamDrawer?.();
  window.sendAgentsamMessage?.(`Draft hero copy for the ${slug} page on Fuel & Free Time.`);
});

loadCmsRegistry().then(() => {
  liveEditor = connectCmsLive(slug, {
    onSectionUpdated(data) {
      if (!dirty) loadPage();
    },
    onPublished() {
      showNote("Published to live site.", "success");
      loadPage();
    },
  });
  loadPage();
});
