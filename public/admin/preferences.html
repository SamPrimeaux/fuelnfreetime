<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preferences — Fuel & Free Time Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css">
<link rel="stylesheet" href="/admin/css/console.css">
<link rel="stylesheet" href="/admin/css/preferences.css">
</head>
<body>
<script src="/admin/js/shell.js"></script>
<script>
let settings = {};
let navItems = [];
let dirty = false;
let domain = "fuelnfreetime.com";

renderShell("/admin/preferences", `
  <div class="prefs-hub">
    <div class="prefs-head">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 9 5 5h14l1 4M4 9h16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zM5.5 13V20h13v-7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <h1>Online Store</h1>
    </div>
    <div class="prefs-crumb">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span>›</span>
      <span>Preferences</span>
    </div>

    <section class="prefs-card">
      <h2>Store access</h2>
      <div class="prefs-row">
        <div class="prefs-row-copy">
          <svg class="prefs-row-icon" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6"/></svg>
          <div>
            <div class="prefs-row-title">Password protection</div>
            <div class="prefs-row-desc">Restrict access to visitors with the password.</div>
            <div class="prefs-password-field" id="password-field" hidden>
              <div class="prefs-field">
                <label for="store-password">Store password</label>
                <input type="password" id="store-password" autocomplete="new-password" placeholder="Enter a storefront password">
              </div>
            </div>
          </div>
        </div>
        <label class="prefs-switch"><input type="checkbox" id="password-protection" data-pref="passwordProtection"><span class="prefs-switch-slider"></span></label>
      </div>
      <div class="prefs-row">
        <div class="prefs-row-copy">
          <svg class="prefs-row-icon" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6"/></svg>
          <div>
            <div class="prefs-row-title">Restrict access to B2B customers only</div>
            <div class="prefs-row-desc">B2B customers will need to log in and verify their account to access your store. <a href="/admin/subscribers">Manage customers</a></div>
          </div>
        </div>
        <label class="prefs-switch"><input type="checkbox" id="b2b-only" data-pref="b2bOnly"><span class="prefs-switch-slider"></span></label>
      </div>
    </section>

    <section class="prefs-card">
      <h2>Social sharing image and SEO</h2>
      <div class="prefs-seo-grid">
        <div class="prefs-social-preview">
          <img id="social-image" src="" alt="">
          <div class="prefs-social-meta">
            <div class="prefs-social-domain" id="social-domain">FUELNFREETIME.COM</div>
            <div class="prefs-social-title" id="social-preview-title">Fuel &amp; Free Time</div>
            <div class="prefs-social-desc" id="social-preview-desc">Store description preview</div>
          </div>
        </div>
        <div>
          <div class="prefs-field">
            <label for="home-title">Home page title</label>
            <input type="text" id="home-title" maxlength="70" data-pref="homeTitle">
            <div class="prefs-counter"><span id="title-count">0</span> of 70 characters used</div>
          </div>
          <div class="prefs-field">
            <label for="meta-description">Meta description</label>
            <textarea id="meta-description" maxlength="320" data-pref="metaDescription" placeholder="Enter a description to be shown on search engines like Google"></textarea>
            <div class="prefs-counter"><span id="meta-count">0</span> of 320 characters used</div>
          </div>
          <div class="prefs-field">
            <label for="social-image-url">Social sharing image URL</label>
            <input type="url" id="social-image-url" data-pref="socialImageUrl">
          </div>
        </div>
      </div>
    </section>

    <section class="prefs-card">
      <h2>Site navigation</h2>
      <p style="margin:0 0 1rem;color:var(--muted,#888);max-width:60ch">Header logo, brand accent, and menu links for every storefront page. Add a row when you publish a new page — no code changes required.</p>
      <div class="prefs-seo-grid" style="grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div class="prefs-field">
          <label for="nav-logo-url">Logo URL</label>
          <input type="url" id="nav-logo-url" placeholder="https://…">
        </div>
        <div class="prefs-field">
          <label for="nav-logo-height">Logo height (px)</label>
          <input type="number" id="nav-logo-height" min="40" max="120" step="1">
        </div>
        <div class="prefs-field">
          <label for="nav-brand-accent">Brand accent</label>
          <input type="color" id="nav-brand-accent" style="height:42px;padding:4px">
        </div>
        <div class="prefs-field">
          <label for="nav-brand-accent-light">Accent highlight</label>
          <input type="color" id="nav-brand-accent-light" style="height:42px;padding:4px">
        </div>
      </div>
      <div id="nav-items-root"></div>
      <button type="button" class="btn ghost small" id="nav-add-item" style="margin-top:.75rem">+ Add menu link</button>
    </section>

    <section class="prefs-card">
      <h2>Automatic redirection</h2>
      <div class="prefs-row">
        <div class="prefs-row-copy">
          <svg class="prefs-row-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.6"/><path d="M4 12h16M12 4c2.5 2 2.5 14 0 16M12 4c-2.5 2-2.5 14 0 16" stroke="currentColor" stroke-width="1.4"/></svg>
          <div>
            <div class="prefs-row-title">Country/region</div>
            <div class="prefs-row-desc">Displays the storefront that matches a visitor's location.</div>
          </div>
        </div>
        <label class="prefs-switch"><input type="checkbox" id="geo-redirect" data-pref="geoRedirect"><span class="prefs-switch-slider"></span></label>
      </div>
      <div class="prefs-row">
        <div class="prefs-row-copy">
          <svg class="prefs-row-icon" viewBox="0 0 24 24" fill="none"><path d="m5 8 7-3 7 3v8l-7 3-7-3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M12 5v14M5 8l7 3 7-3" stroke="currentColor" stroke-width="1.6"/></svg>
          <div>
            <div class="prefs-row-title">Language</div>
            <div class="prefs-row-desc">Displays the language that matches a visitor's browser, when available.</div>
          </div>
        </div>
        <label class="prefs-switch"><input type="checkbox" id="language-redirect" data-pref="languageRedirect"><span class="prefs-switch-slider"></span></label>
      </div>
    </section>

    <section class="prefs-card">
      <h2>Spam protection</h2>
      <p>Enabling hCaptcha can protect your store from spam. Some customers may need to complete the hCaptcha task.</p>
      <div class="prefs-row">
        <div class="prefs-row-copy">
          <svg class="prefs-row-icon" viewBox="0 0 24 24" fill="none"><path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.6"/><path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.6"/></svg>
          <div>
            <div class="prefs-row-title">Enable on contact and comment forms</div>
          </div>
        </div>
        <label class="prefs-switch"><input type="checkbox" id="hcaptcha-contact" data-pref="hcaptchaContact"><span class="prefs-switch-slider"></span></label>
      </div>
      <div class="prefs-row">
        <div class="prefs-row-copy">
          <svg class="prefs-row-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.6"/><path d="M5 20c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <div>
            <div class="prefs-row-title">Enable on login, create account and password recovery pages</div>
          </div>
        </div>
        <label class="prefs-switch"><input type="checkbox" id="hcaptcha-account" data-pref="hcaptchaAccount"><span class="prefs-switch-slider"></span></label>
      </div>
    </section>

    <section class="prefs-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <div>
          <h2 style="margin-bottom:6px;">Crawler access</h2>
          <p style="margin:0;">Authorize external tools to crawl your store. Copy the full values for Signature, Signature-Input, and Signature-Agent, then paste them into your HTTP crawler requests.</p>
        </div>
        <button type="button" class="btn ghost small" id="create-signature-btn">Create signature</button>
      </div>
      <div class="prefs-tabs" role="tablist">
        <button type="button" class="prefs-tab is-active" data-tab="all">All</button>
        <button type="button" class="prefs-tab" data-tab="active">Active</button>
        <button type="button" class="prefs-tab" data-tab="expired">Expired</button>
      </div>
      <div class="prefs-empty" id="crawler-empty">No crawler signatures yet.</div>
    </section>

    <div class="prefs-note" id="prefs-note"></div>
  </div>

  <footer class="prefs-savebar">
    <button type="button" class="btn primary" id="save-prefs-btn" disabled>Save</button>
  </footer>
`);

function setDirty(next = true) {
  dirty = next;
  document.getElementById("save-prefs-btn").disabled = !dirty;
}

function showNote(msg, kind) {
  const el = document.getElementById("prefs-note");
  if (!msg) {
    el.className = "prefs-note";
    el.textContent = "";
    return;
  }
  el.className = `prefs-note is-visible is-${kind || "success"}`;
  el.textContent = msg;
}

function updateCounters() {
  const title = document.getElementById("home-title").value;
  const meta = document.getElementById("meta-description").value;
  document.getElementById("title-count").textContent = title.length;
  document.getElementById("meta-count").textContent = meta.length;
  document.getElementById("social-preview-title").textContent = title || domain;
  document.getElementById("social-preview-desc").textContent =
    meta || "Enter a description to be shown on search engines like Google.";
}

function updateSocialImage() {
  const url = document.getElementById("social-image-url").value.trim();
  const img = document.getElementById("social-image");
  if (url) img.src = url;
}

function togglePasswordField() {
  const on = document.getElementById("password-protection").checked;
  document.getElementById("password-field").hidden = !on;
}

function renderNavItems() {
  const root = document.getElementById("nav-items-root");
  if (!root) return;
  root.innerHTML = navItems
    .map(
      (item, idx) => `
    <div class="prefs-nav-row" data-idx="${idx}" data-id="${item.id || `nav-${idx}`}" style="display:grid;grid-template-columns:1fr 1.2fr 1.4fr auto auto;gap:.5rem;align-items:end;margin-bottom:.65rem;padding:.65rem;border:1px solid rgba(255,255,255,.08);border-radius:8px">
      <div class="prefs-field" style="margin:0">
        <label>Label</label>
        <input type="text" class="nav-label" value="${item.label || ""}" maxlength="40">
      </div>
      <div class="prefs-field" style="margin:0">
        <label>Link (href)</label>
        <input type="text" class="nav-href" value="${item.href || ""}" placeholder="/about.html">
      </div>
      <div class="prefs-field" style="margin:0">
        <label>Match prefixes (comma-separated)</label>
        <input type="text" class="nav-prefixes" value="${(item.matchPrefixes || []).join(", ")}" placeholder="/about">
      </div>
      <label class="prefs-switch" title="Visible in menu" style="margin-bottom:.35rem"><input type="checkbox" class="nav-visible" ${item.visible !== false ? "checked" : ""}><span class="prefs-switch-slider"></span></label>
      <button type="button" class="btn ghost small nav-remove" aria-label="Remove">×</button>
    </div>`
    )
    .join("");

  root.querySelectorAll(".nav-label, .nav-href, .nav-prefixes, .nav-visible").forEach((el) => {
    el.addEventListener("input", () => setDirty(true));
    el.addEventListener("change", () => setDirty(true));
  });
  root.querySelectorAll(".nav-remove").forEach((btn) => {
    btn.addEventListener("click", () => {
      const idx = Number(btn.closest(".prefs-nav-row").dataset.idx);
      navItems.splice(idx, 1);
      renderNavItems();
      setDirty(true);
    });
  });
}

function collectNavItemsFromDom() {
  return Array.from(document.querySelectorAll(".prefs-nav-row")).map((row) => ({
    id: row.dataset.id || `nav-${row.dataset.idx}`,
    label: row.querySelector(".nav-label")?.value.trim() || "",
    href: row.querySelector(".nav-href")?.value.trim() || "",
    matchPrefixes: (row.querySelector(".nav-prefixes")?.value || "")
      .split(",")
      .map((s) => s.trim())
      .filter(Boolean),
    visible: row.querySelector(".nav-visible")?.checked !== false,
  }));
}

function applySettings(data) {
  settings = data.settings || {};
  domain = data.domain || domain;
  navItems = (data.nav?.items || settings.navItems || []).map((item) => ({ ...item }));
  document.getElementById("social-domain").textContent = domain.toUpperCase();

  document.getElementById("password-protection").checked = !!settings.passwordProtection;
  document.getElementById("b2b-only").checked = !!settings.b2bOnly;
  document.getElementById("geo-redirect").checked = !!settings.geoRedirect;
  document.getElementById("language-redirect").checked = !!settings.languageRedirect;
  document.getElementById("hcaptcha-contact").checked = !!settings.hcaptchaContact;
  document.getElementById("hcaptcha-account").checked = !!settings.hcaptchaAccount;

  document.getElementById("home-title").value = settings.homeTitle || "";
  document.getElementById("meta-description").value = settings.metaDescription || "";
  document.getElementById("social-image-url").value = settings.socialImageUrl || "";
  document.getElementById("store-password").value = settings.storePassword || "";

  document.getElementById("nav-logo-url").value = data.nav?.logoUrl || settings.navLogoUrl || "";
  document.getElementById("nav-logo-height").value = data.nav?.logoHeight || settings.navLogoHeight || 68;
  document.getElementById("nav-brand-accent").value = data.nav?.brandAccent || settings.navBrandAccent || "#ff4500";
  document.getElementById("nav-brand-accent-light").value =
    data.nav?.brandAccentLight || settings.navBrandAccentLight || "#E5A558";

  renderNavItems();
  togglePasswordField();
  updateCounters();
  updateSocialImage();
  setDirty(false);
}

function collectSettings() {
  return {
    passwordProtection: document.getElementById("password-protection").checked,
    b2bOnly: document.getElementById("b2b-only").checked,
    geoRedirect: document.getElementById("geo-redirect").checked,
    languageRedirect: document.getElementById("language-redirect").checked,
    hcaptchaContact: document.getElementById("hcaptcha-contact").checked,
    hcaptchaAccount: document.getElementById("hcaptcha-account").checked,
    homeTitle: document.getElementById("home-title").value.trim(),
    metaDescription: document.getElementById("meta-description").value.trim(),
    socialImageUrl: document.getElementById("social-image-url").value.trim(),
    storePassword: document.getElementById("store-password").value,
    navLogoUrl: document.getElementById("nav-logo-url").value.trim(),
    navLogoHeight: Number(document.getElementById("nav-logo-height").value || 68),
    navBrandAccent: document.getElementById("nav-brand-accent").value,
    navBrandAccentLight: document.getElementById("nav-brand-accent-light").value,
    navItems: collectNavItemsFromDom(),
  };
}

document.getElementById("nav-add-item")?.addEventListener("click", () => {
  navItems.push({
    id: `nav-${Date.now()}`,
    label: "New page",
    href: "/",
    matchPrefixes: ["/"],
    visible: true,
  });
  renderNavItems();
  setDirty(true);
});

["nav-logo-url", "nav-logo-height", "nav-brand-accent", "nav-brand-accent-light"].forEach((id) => {
  document.getElementById(id)?.addEventListener("input", () => setDirty(true));
  document.getElementById(id)?.addEventListener("change", () => setDirty(true));
});

document.querySelectorAll("[data-pref]").forEach((el) => {
  el.addEventListener("input", () => {
    setDirty(true);
    if (el.id === "home-title" || el.id === "meta-description") updateCounters();
    if (el.id === "social-image-url") updateSocialImage();
  });
  el.addEventListener("change", () => {
    setDirty(true);
    if (el.id === "password-protection") togglePasswordField();
  });
});

document.getElementById("save-prefs-btn").addEventListener("click", async () => {
  const btn = document.getElementById("save-prefs-btn");
  btn.disabled = true;
  try {
    const d = await adminFetch("/api/admin/store/preferences", {
      method: "POST",
      body: JSON.stringify({ settings: collectSettings() }),
    });
    applySettings(d);
    showNote("Preferences saved.", "success");
  } catch (err) {
    showNote(err.message, "error");
    setDirty(true);
  }
});

document.getElementById("create-signature-btn").addEventListener("click", () => {
  alert("Crawler signature creation is coming soon.");
});

document.querySelectorAll(".prefs-tab").forEach((tab) => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".prefs-tab").forEach((t) => t.classList.remove("is-active"));
    tab.classList.add("is-active");
  });
});

(async function () {
  try {
    const d = await adminFetch("/api/admin/store/preferences");
    applySettings(d);
  } catch (err) {
    showNote(err.message, "error");
  }
})();
</script>
</body>
</html>
