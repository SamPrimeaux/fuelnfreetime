<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content — Fuel & Free Time Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css">
<link rel="stylesheet" href="/admin/css/console.css">
<link rel="stylesheet" href="/admin/css/media-library.css">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>
<script src="/admin/js/shell.js"></script>
<script src="/admin/js/media-library.js"></script>
<script>
renderShell("/admin/content", `
  <div class="media-lib">
    <div class="media-lib-toolbar">
      <nav class="media-lib-crumb" id="media-crumb" aria-label="Media location"></nav>
      <div class="media-lib-actions">
        <input type="file" id="media-file-input" multiple accept="image/*,video/*,.glb,.usdz">
        <button type="button" class="btn primary small" id="media-upload-btn">Upload</button>
      </div>
    </div>

    <div class="media-lib-folders" id="media-folders"></div>

    <div class="media-lib-drop" id="media-drop">
      <div id="media-drop-label">Drag and drop files here, or click to choose</div>
    </div>
    <div class="admin-note" id="media-note" style="display:none;"></div>

    <div class="media-lib-grid" id="media-grid"><div class="admin-empty">Loading…</div></div>
  </div>

  <div class="media-drawer-backdrop" id="media-drawer-backdrop"></div>
  <aside class="media-drawer" id="media-drawer" aria-label="Asset details">
    <div class="media-drawer-head">
      <strong>Asset</strong>
      <button type="button" class="btn ghost small" id="media-drawer-close">Close</button>
    </div>
    <div class="media-drawer-body">
      <div class="media-drawer-preview" id="media-drawer-preview"></div>
      <div class="media-drawer-field">
        <label for="media-field-filename">Filename</label>
        <input type="text" id="media-field-filename" autocomplete="off">
      </div>
      <div class="media-drawer-field">
        <label for="media-field-alt">Alt text</label>
        <textarea id="media-field-alt" rows="2" placeholder="Describe the image for accessibility"></textarea>
      </div>
      <div class="media-drawer-field">
        <label for="media-field-folder">Folder</label>
        <select id="media-field-folder">
          <option value="images">Images</option>
          <option value="videos">Videos</option>
          <option value="products">Products</option>
        </select>
      </div>
      <div class="media-drawer-field media-drawer-meta">
        <div>Size: <span id="media-meta-size">—</span></div>
        <div>Uploaded: <span id="media-meta-date">—</span></div>
        <div>R2 key: <code id="media-meta-key" style="font-size:11px;word-break:break-all;">—</code></div>
      </div>
    </div>
    <div class="media-drawer-foot">
      <button type="button" class="btn danger small" id="media-drawer-delete">Delete</button>
      <button type="button" class="btn primary small" id="media-drawer-save">Save</button>
    </div>
  </aside>
`, { onReady: initMediaLibrary });
</script>
</body>
</html>
