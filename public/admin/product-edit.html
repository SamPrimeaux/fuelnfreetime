<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product — Fuel & Free Time Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin.css">
<link rel="stylesheet" href="/admin/css/console.css">
<style>
  .drop-zone {
    border: 2px dashed var(--line);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    color: var(--smoke);
    font-size: 13px;
    margin-bottom: 18px;
    transition: border-color 0.15s, background 0.15s;
  }
  .drop-zone.is-dragover { border-color: var(--fire-orange); background: rgba(255,69,0,0.06); color: var(--white); }
  .drop-zone input[type="file"] { display: none; }
  .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .img-card { background: var(--asphalt); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; position: relative; }
  .img-card.is-primary { border-color: var(--fire-orange); }
  .img-card .thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #000; }
  .img-card .primary-tag { position: absolute; top: 6px; left: 6px; background: var(--fire-orange); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
  .img-card .actions { display: flex; gap: 4px; padding: 6px; }
  .img-card .actions .btn { flex: 1; padding: 4px 6px; font-size: 11px; }
  .library-toggle { margin-bottom: 10px; }
</style>
</head>
<body>
<script src="/admin/js/shell.js"></script>
<script>
const params = new URLSearchParams(location.search);
const productId = params.get('id');
const isNew = !productId;

renderShell('/admin/products.html', `
  <div class="admin-toolbar">
    <div>
      <h1 class="admin-page-title">${isNew ? 'New Product' : 'Edit Product'}</h1>
      <p class="admin-page-sub">${isNew ? 'Create a catalog item.' : 'Update details and manage variants.'}</p>
    </div>
    <a href="/admin/products.html" class="btn ghost">&larr; Back to Products</a>
  </div>

  <div class="admin-card">
    <form id="product-form">
      <div class="admin-form-grid">
        <div class="admin-form-row">
          <label for="title">Title</label>
          <input id="title" required>
        </div>
        <div class="admin-form-row">
          <label for="slug">Slug (optional — auto-generated from title)</label>
          <input id="slug" placeholder="octane-badge-tee">
        </div>
      </div>
      <div class="admin-form-row">
        <label for="description">Description</label>
        <textarea id="description" rows="3"></textarea>
      </div>
      <div class="admin-form-grid">
        <div class="admin-form-row">
          <label for="collection">Collection</label>
          <input id="collection" placeholder="high-octane / masters / essentials">
        </div>
        <div class="admin-form-row">
          <label for="status">Status</label>
          <select id="status">
            <option value="draft">draft</option>
            <option value="active">active</option>
            <option value="archived">archived</option>
          </select>
        </div>
      </div>
      <div class="admin-form-row">
        <label for="price">Price (USD)</label>
        <input id="price" type="number" step="0.01" min="0" required>
      </div>
      <button type="submit" class="btn primary" id="save-btn">${isNew ? 'Create Product' : 'Save Changes'}</button>
      ${isNew ? '' : '<button type="button" class="btn danger" id="delete-btn" style="margin-left:10px;">Delete Product</button>'}
      <div class="admin-note" id="form-note" style="display:none;"></div>
    </form>
  </div>

  <div class="admin-card" id="images-card" style="${isNew ? 'display:none;' : ''}">
    <div class="admin-card-title">Images</div>
    <div class="img-grid" id="attached-grid"><div class="admin-empty">Loading…</div></div>

    <div class="drop-zone" id="drop-zone">
      <div id="drop-zone-label">Drag and drop images here to upload &amp; attach to this product</div>
      <input type="file" id="file-input" multiple accept="image/*">
    </div>
    <div class="admin-note" id="img-note" style="display:none;"></div>

    <button type="button" class="btn ghost library-toggle" id="library-toggle">Choose from Media Library instead</button>
    <div id="library-grid" class="img-grid" style="display:none;"></div>
  </div>

  <div class="admin-card" id="variants-card" style="${isNew ? 'display:none;' : ''}">
    <div class="admin-card-title">Variants</div>
    <table class="admin-table">
      <thead><tr><th>SKU</th><th>Size</th><th>Color</th><th>Price Override</th><th>Inventory</th><th></th></tr></thead>
      <tbody id="variants-body"><tr><td colspan="6" class="admin-empty">Loading…</td></tr></tbody>
    </table>
    <div style="margin-top:16px;">
      <div class="admin-form-grid" style="grid-template-columns: 1.4fr 0.8fr 0.8fr 0.8fr 0.8fr;">
        <div class="admin-form-row"><label>SKU</label><input id="new-sku" placeholder="octane-tee-bk-m"></div>
        <div class="admin-form-row"><label>Size</label><input id="new-size" placeholder="M"></div>
        <div class="admin-form-row"><label>Color</label><input id="new-color" placeholder="Black"></div>
        <div class="admin-form-row"><label>Price ($)</label><input id="new-price" type="number" step="0.01" placeholder="optional"></div>
        <div class="admin-form-row"><label>Qty</label><input id="new-qty" type="number" value="0"></div>
      </div>
      <button class="btn ghost" id="add-variant-btn">+ Add Variant</button>
      <div class="admin-note" id="variant-note" style="display:none;"></div>
    </div>
  </div>
`);

function note(id, msg, isError) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'admin-note ' + (isError ? 'error' : 'success');
  el.style.display = 'block';
}

let productSlug = '';

// ----- Images -----

async function loadImages() {
  if (isNew) return;
  const grid = document.getElementById('attached-grid');
  try {
    const d = await adminFetch(`/api/admin/products/${productId}/images`);
    if (!d.images.length) {
      grid.innerHTML = '<div class="admin-empty">No images attached yet.</div>';
    } else {
      grid.innerHTML = d.images.map(img => `
        <div class="img-card ${img.is_primary ? 'is-primary' : ''}" data-asset-id="${img.id}">
          ${img.is_primary ? '<span class="primary-tag">Primary</span>' : ''}
          <img class="thumb" src="${img.url}" alt="${img.filename}">
          <div class="actions">
            ${img.is_primary ? '' : '<button class="btn ghost small set-primary-btn">Primary</button>'}
            <button class="btn danger small remove-btn">Remove</button>
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.img-card').forEach(card => {
        const assetId = card.dataset.assetId;
        const primaryBtn = card.querySelector('.set-primary-btn');
        if (primaryBtn) {
          primaryBtn.addEventListener('click', async () => {
            await adminFetch(`/api/admin/products/${productId}/images/${assetId}/primary`, { method: 'POST' });
            loadImages();
          });
        }
        card.querySelector('.remove-btn').addEventListener('click', async () => {
          await adminFetch(`/api/admin/products/${productId}/images/${assetId}`, { method: 'DELETE' });
          loadImages();
        });
      });
    }
  } catch (err) {
    grid.innerHTML = `<div class="admin-empty">${err.message}</div>`;
  }
}

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
if (dropZone) {
  dropZone.addEventListener('click', () => fileInput.click());
  ['dragenter', 'dragover'].forEach(evt =>
    dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add('is-dragover'); })
  );
  ['dragleave', 'drop'].forEach(evt =>
    dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.remove('is-dragover'); })
  );
  dropZone.addEventListener('drop', (e) => {
    if (e.dataTransfer.files.length) uploadAndAttach(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) uploadAndAttach(fileInput.files);
    fileInput.value = '';
  });
}

async function uploadAndAttach(fileList) {
  const label = document.getElementById('drop-zone-label');
  const form = new FormData();
  for (const f of fileList) form.append('files', f);
  form.append('prefix', `products/${productSlug || 'misc'}/`);
  form.append('category', 'product');

  label.textContent = 'Uploading…';
  try {
    const res = await fetch('/api/admin/media', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    for (const asset of data.assets) {
      await adminFetch(`/api/admin/products/${productId}/images`, {
        method: 'POST',
        body: JSON.stringify({ media_asset_id: asset.id }),
      });
    }
    note('img-note', 'Uploaded and attached ' + data.assets.length + ' image(s).', false);
    loadImages();
  } catch (err) {
    note('img-note', err.message, true);
  } finally {
    label.textContent = 'Drag and drop images here to upload & attach to this product';
  }
}

const libraryToggle = document.getElementById('library-toggle');
if (libraryToggle) {
  libraryToggle.addEventListener('click', async () => {
    const grid = document.getElementById('library-grid');
    const showing = grid.style.display !== 'none';
    if (showing) { grid.style.display = 'none'; return; }
    grid.style.display = 'grid';
    grid.innerHTML = '<div class="admin-empty">Loading…</div>';
    try {
      const d = await adminFetch('/api/admin/media');
      if (!d.assets.length) {
        grid.innerHTML = '<div class="admin-empty">No assets in the library yet.</div>';
        return;
      }
      grid.innerHTML = d.assets.map(a => `
        <div class="img-card" data-id="${a.id}">
          <img class="thumb" src="${a.url}" alt="${a.filename}">
          <div class="actions"><button class="btn ghost small attach-btn">Attach</button></div>
        </div>
      `).join('');
      grid.querySelectorAll('.attach-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.closest('.img-card').dataset.id;
          try {
            await adminFetch(`/api/admin/products/${productId}/images`, {
              method: 'POST',
              body: JSON.stringify({ media_asset_id: id }),
            });
            loadImages();
          } catch (err) {
            note('img-note', err.message, true);
          }
        });
      });
    } catch (err) {
      grid.innerHTML = `<div class="admin-empty">${err.message}</div>`;
    }
  });
}

// ----- Variants -----

function renderVariants(variants) {
  const body = document.getElementById('variants-body');
  if (!variants.length) {
    body.innerHTML = '<tr><td colspan="6" class="admin-empty">No variants yet.</td></tr>';
    return;
  }
  body.innerHTML = variants.map(v => `
    <tr data-id="${v.id}">
      <td><input class="v-sku" value="${v.sku}" style="width:140px;"></td>
      <td><input class="v-size" value="${v.size || ''}" style="width:60px;"></td>
      <td><input class="v-color" value="${v.color || ''}" style="width:80px;"></td>
      <td><input class="v-price" type="number" step="0.01" value="${v.price_cents != null ? (v.price_cents / 100).toFixed(2) : ''}" style="width:80px;"></td>
      <td><input class="v-qty admin-inline-qty" type="number" value="${v.inventory_qty}"></td>
      <td>
        <button class="btn ghost small v-save">Save</button>
        <button class="btn danger small v-delete">Delete</button>
      </td>
    </tr>
  `).join('');

  body.querySelectorAll('tr').forEach(row => {
    const id = row.dataset.id;
    row.querySelector('.v-save').addEventListener('click', async () => {
      try {
        await adminFetch(`/api/admin/variants/${id}`, {
          method: 'PUT',
          body: JSON.stringify({
            sku: row.querySelector('.v-sku').value.trim(),
            size: row.querySelector('.v-size').value.trim(),
            color: row.querySelector('.v-color').value.trim(),
            price_cents: row.querySelector('.v-price').value ? Math.round(parseFloat(row.querySelector('.v-price').value) * 100) : null,
            inventory_qty: row.querySelector('.v-qty').value,
          }),
        });
        note('variant-note', 'Variant saved.', false);
      } catch (err) {
        note('variant-note', err.message, true);
      }
    });
    row.querySelector('.v-delete').addEventListener('click', async () => {
      if (!confirm('Delete this variant?')) return;
      try {
        await adminFetch(`/api/admin/variants/${id}`, { method: 'DELETE' });
        loadProduct();
      } catch (err) {
        note('variant-note', err.message, true);
      }
    });
  });
}

async function loadProduct() {
  if (isNew) return;
  try {
    const d = await adminFetch(`/api/admin/products/${productId}`);
    document.getElementById('title').value = d.product.title;
    document.getElementById('slug').value = d.product.slug;
    productSlug = d.product.slug;
    document.getElementById('description').value = d.product.description || '';
    document.getElementById('collection').value = d.product.collection || '';
    document.getElementById('status').value = d.product.status;
    document.getElementById('price').value = (d.product.price_cents / 100).toFixed(2);
    renderVariants(d.variants);
    loadImages();
  } catch (err) {
    note('form-note', err.message, true);
  }
}
loadProduct();

document.getElementById('product-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    title: document.getElementById('title').value.trim(),
    slug: document.getElementById('slug').value.trim(),
    description: document.getElementById('description').value.trim(),
    collection: document.getElementById('collection').value.trim(),
    status: document.getElementById('status').value,
    price_cents: Math.round(parseFloat(document.getElementById('price').value || '0') * 100),
  };
  try {
    if (isNew) {
      const d = await adminFetch('/api/admin/products', { method: 'POST', body: JSON.stringify(payload) });
      window.location.href = `/admin/product-edit.html?id=${d.id}`;
    } else {
      await adminFetch(`/api/admin/products/${productId}`, { method: 'PUT', body: JSON.stringify(payload) });
      note('form-note', 'Saved.', false);
    }
  } catch (err) {
    note('form-note', err.message, true);
  }
});

const deleteBtn = document.getElementById('delete-btn');
if (deleteBtn) {
  deleteBtn.addEventListener('click', async () => {
    if (!confirm('Delete this product and all its variants? This cannot be undone.')) return;
    try {
      await adminFetch(`/api/admin/products/${productId}`, { method: 'DELETE' });
      window.location.href = '/admin/products.html';
    } catch (err) {
      note('form-note', err.message, true);
    }
  });
}

const addVariantBtn = document.getElementById('add-variant-btn');
if (addVariantBtn) {
  addVariantBtn.addEventListener('click', async () => {
    const sku = document.getElementById('new-sku').value.trim();
    if (!sku) { note('variant-note', 'SKU is required.', true); return; }
    try {
      await adminFetch(`/api/admin/products/${productId}/variants`, {
        method: 'POST',
        body: JSON.stringify({
          sku,
          size: document.getElementById('new-size').value.trim(),
          color: document.getElementById('new-color').value.trim(),
          price_cents: document.getElementById('new-price').value ? Math.round(parseFloat(document.getElementById('new-price').value) * 100) : null,
          inventory_qty: document.getElementById('new-qty').value || 0,
        }),
      });
      document.getElementById('new-sku').value = '';
      document.getElementById('new-size').value = '';
      document.getElementById('new-color').value = '';
      document.getElementById('new-price').value = '';
      document.getElementById('new-qty').value = '0';
      note('variant-note', 'Variant added.', false);
      loadProduct();
    } catch (err) {
      note('variant-note', err.message, true);
    }
  });
}
</script>
</body>
</html>
