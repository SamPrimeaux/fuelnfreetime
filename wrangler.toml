name = "fuelnfreetime"
main = "src/index.js"
compatibility_date = "2025-04-01"
workers_dev = true

[vars]
APP_NAME = "Fuel & Free Time"
APP_DOMAIN = "fuelnfreetime.com"
ALLOWED_ORIGINS = "https://fuelnfreetime.com,https://www.fuelnfreetime.com,https://fuelnfreetime.meauxbility.workers.dev"
IAM_MCP_URL = "https://mcp.inneranimalmedia.com/mcp"
IAM_ORIGIN = "https://inneranimalmedia.com"
FNF_GITHUB_REPO = "SamPrimeaux/fuelnfreetime"
FNF_GITHUB_CLIENT_ID = "Ov23li6BZYxjVtGUWibX"

# Custom domains — activate once Cloudflare zone leaves "pending" (nameservers cut over).
[[routes]]
pattern = "fuelnfreetime.com"
custom_domain = true

[[routes]]
pattern = "www.fuelnfreetime.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "fuelnfreetime"
database_id = "9fd6ff92-e407-4b51-8b01-3c93f3845bb2"

[ai]
binding = "AGENTSAM_WAI"

[[r2_buckets]]
binding = "WEBSITE_ASSETS"
bucket_name = "fuelnfreetime"

[[kv_namespaces]]
binding = "CMS_CACHE"
id = "bc3b4e3f272e4b46b3c92df6dff85bff"

[[durable_objects.bindings]]
name = "CMS_EDITOR"
class_name = "CmsEditorRoom"

[[migrations]]
tag = "v1-cms-editor"
new_sqlite_classes = ["CmsEditorRoom"]

[triggers]
crons = ["0 4 * * *"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"
